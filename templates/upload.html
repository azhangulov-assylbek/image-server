<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный загрузчик</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/reset.css')}}" >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <section class="upload__intro">
        <h2 class="upload__title">Загрузка фото</h2>
        <p class="upload__description">Загрузи селфи, мемы или любые забавные картинки здесь.</p>
    </section>
    <nav class="upload__tabs">
        <button class="upload__tab" id="upload-tab-btn">Загрузить</button>
        <button class="upload__tab " id="images-tab-btn">Картинки</button>
    </nav>
    <section class="upload__form">
        <div class="upload__dropzone">
            <div class="upload__icon">
                <img src="{{ url_for('static', filename='img/icon/feather_upload-cloud.png') }}" alt="icon">
            </div>
            <p class="upload__promt">Выбери файл или перемести его сюда</p>
            <p class="upload__info">Поддерживаются только файлы с расширением .jpg, .png and gif. <br>
                Максимальный размер файла - 5MB</p>
        </div>
        <div class="upload__button">
            <input type="file" id="file-upload" accept="image/*" style="display: none;" multiple>
            <label for="file-upload" class="upload__button-btn">Выбрать файл для загрузки</label>
        </div>
        <div class="upload__container">
            <div class="upload__group">
                <h2 class="upload__title-current">Текущая загрузка</h2>
                <div class="upload__label">
                    <input type="text" class="upload__input" placeholder="https://" readonly />
                    <button class="upload__copy">COPY</button>
                </div>
            </div>
        </div>
    </section>
    <section id="file-list-wrapper">
    </section>
</body>
<script src=" {{ url_for('static', filename='js/upload.js') }} "></script>

</html>
